<form id="add-form" class="form-horizontal form-ajax" role="form" data-toggle="validator" method="POST" action="">
    {:token()}
    <div class="form-group"><label class="control-label col-xs-12 col-sm-2">{:__('Name')}:</label><div class="col-xs-12 col-sm-8"><input type="text" class="form-control" name="row[name]" data-rule="required" /></div></div>
    <div class="form-group"><label class="control-label col-xs-12 col-sm-2">{:__('Template_key')}:</label><div class="col-xs-12 col-sm-8"><input type="text" class="form-control" name="row[template_key]" data-rule="required" /></div></div>
    <div class="form-group"><label class="control-label col-xs-12 col-sm-2">{:__('Game_id')}:</label><div class="col-xs-12 col-sm-8"><input type="number" class="form-control" name="row[game_id]" value="0" /></div></div>
    <div class="form-group"><label class="control-label col-xs-12 col-sm-2">{:__('Repair_type')}:</label><div class="col-xs-12 col-sm-8"><input type="text" class="form-control" name="row[repair_type]" value="common" /></div></div>
    <div class="form-group"><label class="control-label col-xs-12 col-sm-2">{:__('Steps_json')}:</label><div class="col-xs-12 col-sm-8"><textarea class="form-control" rows="4" name="row[steps_json]"></textarea></div></div>
    <div class="form-group"><label class="control-label col-xs-12 col-sm-2">{:__('Version')}:</label><div class="col-xs-12 col-sm-8"><input type="number" class="form-control" name="row[version]" value="1" /></div></div>
    <div class="form-group"><label class="control-label col-xs-12 col-sm-2">{:__('Status')}:</label><div class="col-xs-12 col-sm-8">{:build_radios('row[status]', ['normal'=>__('Normal'), 'hidden'=>__('Hidden')])}</div></div>
    <div class="form-group hidden layer-footer"><label class="control-label col-xs-12 col-sm-2"></label><div class="col-xs-12 col-sm-8"><button type="submit" class="btn btn-primary btn-embossed disabled">{:__('OK')}</button><button type="reset" class="btn btn-default btn-embossed">{:__('Reset')}</button></div></div>
</form>
