<form id="edit-form" class="form-horizontal form-ajax" role="form" data-toggle="validator" method="POST" action="">
    {:token()}
    <div class="form-group"><label class="control-label col-xs-12 col-sm-2">{:__('Status')}:</label><div class="col-xs-12 col-sm-8">{:build_radios('row[status]', ['open'=>__('Open'), 'closed'=>__('Closed')], $row.status)}</div></div>
    <div class="form-group"><label class="control-label col-xs-12 col-sm-2">{:__('Detail')}:</label><div class="col-xs-12 col-sm-8"><textarea class="form-control" rows="3" name="row[detail]">{$row.detail|htmlentities}</textarea></div></div>
    <div class="form-group hidden layer-footer"><label class="control-label col-xs-12 col-sm-2"></label><div class="col-xs-12 col-sm-8"><button type="submit" class="btn btn-primary btn-embossed disabled">{:__('OK')}</button><button type="reset" class="btn btn-default btn-embossed">{:__('Reset')}</button></div></div>
</form>
