<form id="edit-form" class="form-horizontal form-ajax" role="form" data-toggle="validator" method="POST" action="">
    {:token()}
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Game_id')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input type="number" class="form-control" name="row[game_id]" value="{$row.game_id|htmlentities}" data-rule="required" />
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Resource_type')}:</label>
        <div class="col-xs-12 col-sm-8">
            {:build_select('row[resource_type]', ['game'=>__('Game'),'mod'=>__('Mod'),'plugin'=>__('Plugin'),'patch'=>__('Patch'),'tool'=>__('Tool')], $row.resource_type)}
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Name')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input type="text" class="form-control" name="row[name]" value="{$row.name|htmlentities}" data-rule="required" />
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Version')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input type="text" class="form-control" name="row[version]" value="{$row.version|htmlentities}" />
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('File_path')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input type="text" class="form-control" name="row[file_path]" value="{$row.file_path|htmlentities}" data-rule="required" />
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('File_hash')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input type="text" class="form-control" name="row[file_hash]" value="{$row.file_hash|htmlentities}" />
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('File_size')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input type="number" class="form-control" name="row[file_size]" value="{$row.file_size|htmlentities}" />
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Channel_key')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input type="text" class="form-control" name="row[channel_key]" value="{$row.channel_key|htmlentities}" />
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Priority')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input type="number" class="form-control" name="row[priority]" value="{$row.priority|htmlentities}" />
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Weigh')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input type="number" class="form-control" name="row[weigh]" value="{$row.weigh|htmlentities}" />
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">Aria2单链接并发:</label>
        <div class="col-xs-12 col-sm-8">
            <input type="number" class="form-control" id="aria2-max-conn" value="8" min="1" max="64" />
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">Aria2分片数:</label>
        <div class="col-xs-12 col-sm-8">
            <input type="number" class="form-control" id="aria2-split" value="8" min="1" max="64" />
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">Aria2最小分片:</label>
        <div class="col-xs-12 col-sm-8">
            <input type="text" class="form-control" id="aria2-min-split-size" value="4M" />
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">包格式:</label>
        <div class="col-xs-12 col-sm-8">
            <select class="form-control" id="pkg-archive-type">
                <option value="auto">auto</option>
                <option value="zip">zip</option>
                <option value="7z">7z</option>
                <option value="none">none</option>
            </select>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">解压目录:</label>
        <div class="col-xs-12 col-sm-8">
            <input type="text" class="form-control" id="pkg-extract-dir" placeholder="留空使用默认目录" />
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">安装目录:</label>
        <div class="col-xs-12 col-sm-8">
            <input type="text" class="form-control" id="pkg-install-dir" placeholder="示例: D:/Games/Systema" />
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">部署模式:</label>
        <div class="col-xs-12 col-sm-8">
            <select class="form-control" id="pkg-deploy-mode">
                <option value="atomic">atomic</option>
                <option value="replace">replace</option>
            </select>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">备份保留数:</label>
        <div class="col-xs-12 col-sm-8">
            <input type="number" class="form-control" id="pkg-keep-backups" value="2" min="0" max="10" />
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Extra_json')}:</label>
        <div class="col-xs-12 col-sm-8">
            <textarea class="form-control" rows="3" name="row[extra_json]">{$row.extra_json|htmlentities}</textarea>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Status')}:</label>
        <div class="col-xs-12 col-sm-8">
            {:build_radios('row[status]', ['normal'=>__('Normal'), 'hidden'=>__('Hidden')], $row.status)}
        </div>
    </div>
    <div class="form-group hidden layer-footer">
        <label class="control-label col-xs-12 col-sm-2"></label>
        <div class="col-xs-12 col-sm-8">
            <button type="submit" class="btn btn-primary btn-embossed disabled">{:__('OK')}</button>
            <button type="reset" class="btn btn-default btn-embossed">{:__('Reset')}</button>
        </div>
    </div>
</form>
