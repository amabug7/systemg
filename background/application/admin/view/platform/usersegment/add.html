<form id="add-form" class="form-horizontal form-ajax" role="form" data-toggle="validator" method="POST" action="">
    {:token()}
    <div class="form-group"><label class="control-label col-xs-12 col-sm-2">{:__('User_id')}:</label><div class="col-xs-12 col-sm-8"><input type="number" class="form-control" name="row[user_id]" data-rule="required" /></div></div>
    <div class="form-group"><label class="control-label col-xs-12 col-sm-2">{:__('Segment_tag')}:</label><div class="col-xs-12 col-sm-8"><input type="text" class="form-control" name="row[segment_tag]" data-rule="required" /></div></div>
    <div class="form-group"><label class="control-label col-xs-12 col-sm-2">{:__('Score')}:</label><div class="col-xs-12 col-sm-8"><input type="number" step="0.01" class="form-control" name="row[score]" value="0" /></div></div>
    <div class="form-group"><label class="control-label col-xs-12 col-sm-2">{:__('Active_days_30')}:</label><div class="col-xs-12 col-sm-8"><input type="number" class="form-control" name="row[active_days_30]" value="0" /></div></div>
    <div class="form-group"><label class="control-label col-xs-12 col-sm-2">{:__('Pay_amount_30')}:</label><div class="col-xs-12 col-sm-8"><input type="number" step="0.01" class="form-control" name="row[pay_amount_30]" value="0" /></div></div>
    <div class="form-group"><label class="control-label col-xs-12 col-sm-2">{:__('Snapshot_date')}:</label><div class="col-xs-12 col-sm-8"><input type="text" class="form-control" name="row[snapshot_date]" value="{:date('Y-m-d')}" /></div></div>
    <div class="form-group hidden layer-footer"><label class="control-label col-xs-12 col-sm-2"></label><div class="col-xs-12 col-sm-8"><button type="submit" class="btn btn-primary btn-embossed disabled">{:__('OK')}</button><button type="reset" class="btn btn-default btn-embossed">{:__('Reset')}</button></div></div>
</form>
