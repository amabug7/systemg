<form id="edit-form" class="form-horizontal form-ajax" role="form" data-toggle="validator" method="POST" action="">
    {:token()}
    <div class="form-group"><label class="control-label col-xs-12 col-sm-2">{:__('Status')}:</label><div class="col-xs-12 col-sm-8">{:build_radios('row[status]', ['pending'=>__('Pending'), 'approved'=>__('Approved'), 'rejected'=>__('Rejected')], $row.status)}</div></div>
    <div class="form-group"><label class="control-label col-xs-12 col-sm-2">{:__('Audit_remark')}:</label><div class="col-xs-12 col-sm-8"><input type="text" class="form-control" name="row[audit_remark]" value="{$row.audit_remark|htmlentities}" /></div></div>
    <div class="form-group hidden layer-footer"><label class="control-label col-xs-12 col-sm-2"></label><div class="col-xs-12 col-sm-8"><button type="submit" class="btn btn-primary btn-embossed disabled">{:__('OK')}</button><button type="reset" class="btn btn-default btn-embossed">{:__('Reset')}</button></div></div>
</form>
