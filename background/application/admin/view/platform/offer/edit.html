<form id="edit-form" class="form-horizontal form-ajax" role="form" data-toggle="validator" method="POST" action="">
    {:token()}
    <div class="form-group"><label class="control-label col-xs-12 col-sm-2">{:__('Game_id')}:</label><div class="col-xs-12 col-sm-8"><input type="number" class="form-control" name="row[game_id]" value="{$row.game_id|htmlentities}" data-rule="required" /></div></div>
    <div class="form-group"><label class="control-label col-xs-12 col-sm-2">{:__('Item_type')}:</label><div class="col-xs-12 col-sm-8"><input type="text" class="form-control" name="row[item_type]" value="{$row.item_type|htmlentities}" data-rule="required" /></div></div>
    <div class="form-group"><label class="control-label col-xs-12 col-sm-2">{:__('Item_name')}:</label><div class="col-xs-12 col-sm-8"><input type="text" class="form-control" name="row[item_name]" value="{$row.item_name|htmlentities}" data-rule="required" /></div></div>
    <div class="form-group"><label class="control-label col-xs-12 col-sm-2">{:__('Base_price')}:</label><div class="col-xs-12 col-sm-8"><input type="number" step="0.01" class="form-control" name="row[base_price]" value="{$row.base_price|htmlentities}" /></div></div>
    <div class="form-group"><label class="control-label col-xs-12 col-sm-2">{:__('Member_price')}:</label><div class="col-xs-12 col-sm-8"><input type="number" step="0.01" class="form-control" name="row[member_price]" value="{$row.member_price|htmlentities}" /></div></div>
    <div class="form-group"><label class="control-label col-xs-12 col-sm-2">{:__('Level_discount_json')}:</label><div class="col-xs-12 col-sm-8"><textarea class="form-control" rows="3" name="row[level_discount_json]">{$row.level_discount_json|htmlentities}</textarea></div></div>
    <div class="form-group"><label class="control-label col-xs-12 col-sm-2">{:__('Status')}:</label><div class="col-xs-12 col-sm-8">{:build_radios('row[status]', ['normal'=>__('Normal'), 'hidden'=>__('Hidden')], $row.status)}</div></div>
    <div class="form-group hidden layer-footer"><label class="control-label col-xs-12 col-sm-2"></label><div class="col-xs-12 col-sm-8"><button type="submit" class="btn btn-primary btn-embossed disabled">{:__('OK')}</button><button type="reset" class="btn btn-default btn-embossed">{:__('Reset')}</button></div></div>
</form>
