<form id="add-form" class="form-horizontal form-ajax" role="form" data-toggle="validator" method="POST" action="">
    {:token()}
    <div class="form-group"><label class="control-label col-xs-12 col-sm-2">{:__('Channel_key')}:</label><div class="col-xs-12 col-sm-8"><input type="text" class="form-control" name="row[channel_key]" data-rule="required" /></div></div>
    <div class="form-group"><label class="control-label col-xs-12 col-sm-2">{:__('Endpoint')}:</label><div class="col-xs-12 col-sm-8"><input type="text" class="form-control" name="row[endpoint]" data-rule="required" /></div></div>
    <div class="form-group"><label class="control-label col-xs-12 col-sm-2">{:__('Latency_ms')}:</label><div class="col-xs-12 col-sm-8"><input type="number" class="form-control" name="row[latency_ms]" value="0" /></div></div>
    <div class="form-group"><label class="control-label col-xs-12 col-sm-2">{:__('Http_code')}:</label><div class="col-xs-12 col-sm-8"><input type="number" class="form-control" name="row[http_code]" value="200" /></div></div>
    <div class="form-group"><label class="control-label col-xs-12 col-sm-2">{:__('Status')}:</label><div class="col-xs-12 col-sm-8"><input type="text" class="form-control" name="row[status]" value="ok" /></div></div>
    <div class="form-group"><label class="control-label col-xs-12 col-sm-2">{:__('Detail')}:</label><div class="col-xs-12 col-sm-8"><input type="text" class="form-control" name="row[detail]" /></div></div>
    <div class="form-group hidden layer-footer"><label class="control-label col-xs-12 col-sm-2"></label><div class="col-xs-12 col-sm-8"><button type="submit" class="btn btn-primary btn-embossed disabled">{:__('OK')}</button><button type="reset" class="btn btn-default btn-embossed">{:__('Reset')}</button></div></div>
</form>
