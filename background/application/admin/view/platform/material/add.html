<form id="add-form" class="form-horizontal form-ajax" role="form" data-toggle="validator" method="POST" action="">
    {:token()}
    <div class="form-group"><label class="control-label col-xs-12 col-sm-2">{:__('Name')}:</label><div class="col-xs-12 col-sm-8"><input type="text" class="form-control" name="row[name]" data-rule="required" /></div></div>
    <div class="form-group"><label class="control-label col-xs-12 col-sm-2">{:__('Material_type')}:</label><div class="col-xs-12 col-sm-8"><input type="text" class="form-control" name="row[material_type]" value="image" /></div></div>
    <div class="form-group"><label class="control-label col-xs-12 col-sm-2">{:__('Url')}:</label><div class="col-xs-12 col-sm-8"><input type="text" class="form-control" name="row[url]" data-rule="required" /></div></div>
    <div class="form-group"><label class="control-label col-xs-12 col-sm-2">{:__('Thumb')}:</label><div class="col-xs-12 col-sm-8"><input type="text" class="form-control" name="row[thumb]" /></div></div>
    <div class="form-group"><label class="control-label col-xs-12 col-sm-2">{:__('Tags')}:</label><div class="col-xs-12 col-sm-8"><input type="text" class="form-control" name="row[tags]" /></div></div>
    <div class="form-group"><label class="control-label col-xs-12 col-sm-2">{:__('Status')}:</label><div class="col-xs-12 col-sm-8">{:build_radios('row[status]', ['normal'=>__('Normal'), 'hidden'=>__('Hidden')])}</div></div>
    <div class="form-group hidden layer-footer"><label class="control-label col-xs-12 col-sm-2"></label><div class="col-xs-12 col-sm-8"><button type="submit" class="btn btn-primary btn-embossed disabled">{:__('OK')}</button><button type="reset" class="btn btn-default btn-embossed">{:__('Reset')}</button></div></div>
</form>
