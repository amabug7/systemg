<div class="panel panel-default panel-intro">
    {:build_heading()}
    <div class="panel-body">
        <div id="myTabContent" class="tab-content">
            <div class="tab-pane fade active in" id="one">
                <div class="widget-body no-padding">
                    <div id="toolbar" class="toolbar">
                        <a href="javascript:;" class="btn btn-primary btn-refresh" title="{:__('Refresh')}"><i class="fa fa-refresh"></i></a>
                        <a href="javascript:;" class="btn btn-success btn-exportlogs {:$auth->check('platform/installlog/export')?'':'hide'}" title="{:__('Export')}"><i class="fa fa-download"></i> {:__('Export')}</a>
                        <a href="javascript:;" class="btn btn-warning btn-only-failed" title="{:__('Only failed')}"><i class="fa fa-filter"></i> {:__('Only failed')}</a>
                        <a href="javascript:;" class="btn btn-default btn-clear-status-filter" title="{:__('Clear filter')}"><i class="fa fa-eraser"></i> {:__('Clear filter')}</a>
                    </div>
                    <div id="active-filter-hint" class="alert alert-info" style="margin:10px;display:none;"></div>
                    <table id="table" class="table table-striped table-bordered table-hover table-nowrap" width="100%"></table>
                    <div class="modal fade" id="installlog-detail-modal" tabindex="-1" role="dialog" aria-hidden="true">
                        <div class="modal-dialog modal-lg" role="document">
                            <div class="modal-content">
                                <div class="modal-header">
                                    <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
                                    <h4 class="modal-title">{:__('Detail')}</h4>
                                </div>
                                <div class="modal-body">
                                    <pre id="installlog-detail-json" style="max-height:420px;overflow:auto;"></pre>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
