<form id="edit-form" class="form-horizontal form-ajax" role="form" data-toggle="validator" method="POST" action="">
    {:token()}
    <div class="form-group"><label class="control-label col-xs-12 col-sm-2">{:__('Template_key')}:</label><div class="col-xs-12 col-sm-8"><input type="text" class="form-control" name="row[template_key]" value="{$row.template_key|htmlentities}" data-rule="required" /></div></div>
    <div class="form-group"><label class="control-label col-xs-12 col-sm-2">{:__('Action_key')}:</label><div class="col-xs-12 col-sm-8"><input type="text" class="form-control" name="row[action_key]" value="{$row.action_key|htmlentities}" data-rule="required" /></div></div>
    <div class="form-group"><label class="control-label col-xs-12 col-sm-2">{:__('Repair_type')}:</label><div class="col-xs-12 col-sm-8"><input type="text" class="form-control" name="row[repair_type]" value="{$row.repair_type|htmlentities}" /></div></div>
    <div class="form-group"><label class="control-label col-xs-12 col-sm-2">{:__('Game_id')}:</label><div class="col-xs-12 col-sm-8"><input type="number" class="form-control" name="row[game_id]" value="{$row.game_id|htmlentities}" /></div></div>
    <div class="form-group"><label class="control-label col-xs-12 col-sm-2">{:__('Risk_level')}:</label><div class="col-xs-12 col-sm-8"><input type="text" class="form-control" name="row[risk_level]" value="{$row.risk_level|htmlentities}" /></div></div>
    <div class="form-group"><label class="control-label col-xs-12 col-sm-2">{:__('Remark')}:</label><div class="col-xs-12 col-sm-8"><input type="text" class="form-control" name="row[remark]" value="{$row.remark|htmlentities}" /></div></div>
    <div class="form-group"><label class="control-label col-xs-12 col-sm-2">{:__('Status')}:</label><div class="col-xs-12 col-sm-8">{:build_radios('row[status]', ['normal'=>__('Normal'), 'hidden'=>__('Hidden')], $row.status)}</div></div>
    <div class="form-group hidden layer-footer"><label class="control-label col-xs-12 col-sm-2"></label><div class="col-xs-12 col-sm-8"><button type="submit" class="btn btn-primary btn-embossed disabled">{:__('OK')}</button><button type="reset" class="btn btn-default btn-embossed">{:__('Reset')}</button></div></div>
</form>
