<form id="edit-form" class="form-horizontal form-ajax" role="form" data-toggle="validator" method="POST" action="">
    {:token()}
    <div class="form-group"><label class="control-label col-xs-12 col-sm-2">{:__('Experiment_key')}:</label><div class="col-xs-12 col-sm-8"><input type="text" class="form-control" name="row[experiment_key]" value="{$row.experiment_key|htmlentities}" data-rule="required" /></div></div>
    <div class="form-group"><label class="control-label col-xs-12 col-sm-2">{:__('Name')}:</label><div class="col-xs-12 col-sm-8"><input type="text" class="form-control" name="row[name]" value="{$row.name|htmlentities}" data-rule="required" /></div></div>
    <div class="form-group"><label class="control-label col-xs-12 col-sm-2">{:__('Terminal')}:</label><div class="col-xs-12 col-sm-8"><input type="text" class="form-control" name="row[terminal]" value="{$row.terminal|htmlentities}" /></div></div>
    <div class="form-group"><label class="control-label col-xs-12 col-sm-2">{:__('Status')}:</label><div class="col-xs-12 col-sm-8"><input type="text" class="form-control" name="row[status]" value="{$row.status|htmlentities}" /></div></div>
    <div class="form-group"><label class="control-label col-xs-12 col-sm-2">{:__('Targeting_json')}:</label><div class="col-xs-12 col-sm-8"><textarea class="form-control" rows="3" name="row[targeting_json]">{$row.targeting_json|htmlentities}</textarea></div></div>
    <div class="form-group"><label class="control-label col-xs-12 col-sm-2">{:__('Variants_json')}:</label><div class="col-xs-12 col-sm-8"><textarea class="form-control" rows="3" name="row[variants_json]">{$row.variants_json|htmlentities}</textarea></div></div>
    <div class="form-group"><label class="control-label col-xs-12 col-sm-2">{:__('Metric_event')}:</label><div class="col-xs-12 col-sm-8"><input type="text" class="form-control" name="row[metric_event]" value="{$row.metric_event|htmlentities}" /></div></div>
    <div class="form-group hidden layer-footer"><label class="control-label col-xs-12 col-sm-2"></label><div class="col-xs-12 col-sm-8"><button type="submit" class="btn btn-primary btn-embossed disabled">{:__('OK')}</button><button type="reset" class="btn btn-default btn-embossed">{:__('Reset')}</button></div></div>
</form>
